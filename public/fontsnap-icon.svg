<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
    <!-- Тіні -->
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
            <feOffset dx="0" dy="2" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.2" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Фонові прямокутники з тінню -->
    <g filter="url(#shadow)" transform="translate(10, 0)">
        <rect x="0" y="10" width="40" height="40" fill="#6C63FF" transform="rotate(15, 20, 30)" rx="8"/>
        <rect x="0" y="10" width="40" height="40" fill="#FF6584" transform="rotate(-15, 20, 30)" rx="8"/>
    </g>

    <!-- Декоративні елементи -->
    <g transform="translate(10, 0)">
        <text x="13" y="35" font-family="Arial" font-weight="bold" font-size="16" fill="white" transform="rotate(-5, 20, 30)">Aa</text>
    </g>
</svg>
